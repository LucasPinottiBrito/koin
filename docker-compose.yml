services:
  backend-api:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-koin backend}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://koin:koin@postgres:5432/koin}
      MONGO_URL: ${MONGO_URL:-mongodb://koin:koin@mongodb:27017/koin?authSource=admin}
      MONGO_DATABASE: ${MONGO_DATABASE:-koin}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
    command: ["fastapi", "run", "src/main.py", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-koin backend}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://koin:koin@postgres:5432/koin}
      MONGO_URL: ${MONGO_URL:-mongodb://koin:koin@mongodb:27017/koin?authSource=admin}
      MONGO_DATABASE: ${MONGO_DATABASE:-koin}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
    command: ["python", "-m", "src.workers.main"]
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koin}
      POSTGRES_USER: ${POSTGRES_USER:-koin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-koin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-koin}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-koin}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username $${MONGO_INITDB_ROOT_USERNAME} --password $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  mongodb_data:
